<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CloudAudio PWA - Stream audio from Google Drive">
    
    <!-- iOS PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CloudAudio">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">

    <title>CloudAudio</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // System-based dark mode
            theme: {
                extend: {
                    colors: {
                        brand: '#059669', // Deep Emerald
                    }
                }
            }
        }
    </script>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Local Credentials (should be in .gitignore) -->
    <script src="config.js"></script>

    <style>
        /* iOS Smooth Scrolling */
        body {
            -webkit-overflow-scrolling: touch;
        }
        /* Hide scrollbar for clean UI in mini-player areas if needed later */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm fixed w-full top-0 z-30 safe-area-inset-top">
        <div class="max-w-md mx-auto px-4 h-16 flex justify-between items-center">
            <button onclick="localStorage.removeItem('cloudAudio_state'); window.location.search=''; window.location.reload();" class="text-xl font-bold tracking-tight text-brand hover:opacity-80 transition-opacity">
                🏠 CloudAudio
            </button>
            
            <!-- Auth Container -->
            <div id="auth-container" class="flex items-center space-x-4">
                <span id="offline-indicator" class="hidden text-xs font-bold text-red-500 bg-red-100 dark:bg-red-900 dark:text-red-300 px-2 py-1 rounded-full">Offline</span>
                <!-- Login Button -->
                <button id="login-btn" class="bg-brand hover:bg-blue-600 text-white text-sm font-medium py-2 px-4 rounded-full shadow transition-opacity duration-300">
                    Login
                </button>

                <!-- User Profile (Hidden by default) -->
                <div id="user-profile" class="hidden flex items-center space-x-3">
                    <span id="user-name" class="text-sm font-medium truncate max-w-[100px]"></span>
                    <button id="signout-btn" class="text-xs text-red-500 hover:text-red-400 font-medium border border-red-200 dark:border-red-900 px-2 py-1 rounded">
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Placeholder -->
    <main id="app-content" class="flex-grow p-4 max-w-md mx-auto w-full pt-20 pb-24">
        <!-- Initial State --> 
        <div id="welcome-message" class="flex flex-col items-center justify-center h-64 text-center space-y-4">
            <p class="text-gray-500 dark:text-gray-400">Sign in to access your Google Drive audio folders.</p>
        </div>
        
        <!-- Folder Input Form (Hidden by default) -->
        <div id="folder-input-container" class="hidden flex flex-col items-center justify-center space-y-4 mt-10">
            <p class="text-gray-600 dark:text-gray-300">Enter a Google Drive Folder ID to start:</p>
            <div class="flex w-full max-w-xs space-x-2">
                <input type="text" id="folder-id-input" placeholder="Folder ID" class="flex-1 rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
                <button id="load-folder-btn" class="bg-brand text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-600">Load</button>
            </div>
            <p class="text-xs text-gray-400">Or use a shared link with ?folderId=...</p>
        </div>

        <!-- Library Container (Populated dynamically) -->
        <div id="library-container" class="hidden w-full"></div>
    </main>

    <!-- Player UI -->
    <div id="player-ui" class="hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 transition-all duration-300 ease-in-out h-16">
        
        <!-- Progress Bar (Mini) -->
        <div id="mini-progress-container" class="absolute top-0 left-0 w-full h-1 bg-gray-200 dark:bg-gray-700 cursor-pointer z-50">
            <div id="mini-progress-bar" class="h-full bg-brand w-0 transition-all duration-100"></div>
        </div>

        <!-- Mini Player Content -->
        <div id="mini-player" class="flex items-center justify-between px-4 h-full w-full">
            <div class="flex items-center flex-1 min-w-0 cursor-pointer" id="mini-info">
                <div class="flex-shrink-0 w-10 h-10 bg-gray-100 dark:bg-gray-700 rounded flex items-center justify-center text-xl mr-3">🎵</div>
                <div class="truncate">
                    <p id="mini-title" class="text-sm font-medium truncate">Select a song</p>
                </div>
            </div>
            <div class="flex items-center space-x-3 ml-2">
                <button id="mini-play-btn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-brand w-10 h-10 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z" /></svg>
                </button>
                <button id="player-expand-btn" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
                </button>
            </div>
        </div>

        <!-- Full Player Content (Hidden by default) -->
        <div id="full-player" class="hidden flex-col justify-center h-screen w-full bg-white dark:bg-gray-800 absolute top-0 left-0 p-6 pb-32 overflow-y-auto z-60">
            <button id="player-collapse-btn" class="absolute top-6 right-6 text-gray-500 p-4 z-50 hover:text-gray-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            </button>
            
            <div class="w-64 h-64 bg-gray-100 dark:bg-gray-700 rounded-2xl mx-auto mb-8 flex items-center justify-center text-8xl shadow-inner text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-24 h-24 text-gray-400 dark:text-gray-500">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z" />
                </svg>
            </div>
            
            <div class="text-center mb-8">
                <h2 id="full-title" class="text-2xl font-bold mb-2 text-gray-900 dark:text-white">Song Title</h2>
                <p class="text-gray-500 dark:text-gray-400">Google Drive Audio</p>
            </div>
            
            <div class="flex flex-col space-y-6 w-full max-w-md mx-auto">
                <input type="range" id="seek-slider" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700 accent-brand" value="0" min="0" max="100">
                <div class="flex justify-between text-xs text-gray-500 font-mono">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                
                <div class="flex items-center justify-center space-x-10">
                    <button id="prev-btn" class="text-4xl text-gray-600 dark:text-gray-300 hover:text-brand transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10"><path d="M5.25 3v18H3V3h2.25zM9.75 12L18 19.5V4.5L9.75 12z" /></svg>
                    </button>
                    <button id="full-play-btn" class="text-6xl text-brand hover:scale-105 transition-transform shadow-lg shadow-emerald-500/30 rounded-full w-20 h-20 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-12 h-12"><path d="M8.25 4.5a.75.75 0 01.75.75v13.5a.75.75 0 01-1.5 0V5.25a.75.75 0 01.75-.75zM15.75 4.5a.75.75 0 01.75.75v13.5a.75.75 0 01-1.5 0V5.25a.75.75 0 01.75-.75z" /></svg>
                    </button>
                    <button id="next-btn" class="text-4xl text-gray-600 dark:text-gray-300 hover:text-brand transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10"><path d="M18.75 3v18H21V3h-2.25zM14.25 12L6 4.5v15L14.25 12z" /></svg>
                    </button>
                </div>

                <!-- Shuffle and Loop Controls -->
                <div class="flex items-center justify-center space-x-6 w-full max-w-xs mx-auto text-gray-500 mt-4">
                    <button id="shuffle-btn" class="px-4 py-2 text-sm font-medium rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        Shuffle
                    </button>
                    <button id="loop-btn" class="px-4 py-2 text-sm font-medium rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        Loop
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- Configuration --- */
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.profile';
        const AUDIO_CACHE_NAME = 'cloudaudio-audio-v2';

        /* --- State --- */
        let tokenClient;
        let accessToken = null;
        let currentFolderId = null;
        let folderStack = []; // To track navigation history
        let isOffline = !navigator.onLine;
        let libraryMap = {}; // Master map of folderId -> items
        
        let cachedFileIds = new Set(); // Tracks which file IDs are in the cache
        let downloadingFileIds = new Set(); // Tracks which file IDs are currently being downloaded
        // Audio Engine State
        let audio = new Audio();
        let shuffleMode = false;
        let loopMode = 'none'; // 'none', 'folder', 'single'
        let activePlaylist = []; // This will be either the original or shuffled playlist
        let playlist = []; // Array of file objects
        let currentTrackIndex = -1;
        let isPlayerExpanded = false;
        let currentObjectUrl = null;

        /* --- DOM Elements --- */
        const loginBtn = document.getElementById('login-btn');
        const signoutBtn = document.getElementById('signout-btn');
        const userProfile = document.getElementById('user-profile');
        const userNameSpan = document.getElementById('user-name');
        const welcomeMessage = document.getElementById('welcome-message');
        const folderInputContainer = document.getElementById('folder-input-container');
        const libraryContainer = document.getElementById('library-container');
        const offlineIndicator = document.getElementById('offline-indicator');
        
        // Player DOM
        const playerUi = document.getElementById('player-ui');
        const miniPlayer = document.getElementById('mini-player');
        const fullPlayer = document.getElementById('full-player');
        const miniTitle = document.getElementById('mini-title');
        const fullTitle = document.getElementById('full-title');
        const miniPlayBtn = document.getElementById('mini-play-btn');
        const fullPlayBtn = document.getElementById('full-play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const loopBtn = document.getElementById('loop-btn');
        const expandBtn = document.getElementById('player-expand-btn');
        const collapseBtn = document.getElementById('player-collapse-btn');
        const seekSlider = document.getElementById('seek-slider');
        const currentTimeSpan = document.getElementById('current-time');
        const durationSpan = document.getElementById('duration');
        const miniProgressBar = document.getElementById('mini-progress-bar');

        /* --- Initialization --- */
        window.onload = function() {
            // Load the cached library map on startup
            const savedLibrary = localStorage.getItem('cloudAudio_libraryMap');
            if (savedLibrary) {
                try {
                    libraryMap = JSON.parse(savedLibrary);
                } catch (e) {
                    console.error("Could not parse library map from localStorage", e);
                    libraryMap = {};
                }
            }

            // Load the set of cached file IDs
            const savedCacheIds = localStorage.getItem('cloudAudio_cachedIds');
            if (savedCacheIds) {
                try {
                    cachedFileIds = new Set(JSON.parse(savedCacheIds));
                } catch (e) { console.error("Could not parse cached IDs", e); }
            }

            // Load player settings
            shuffleMode = localStorage.getItem('cloudAudio_shuffle') === 'true';
            loopMode = localStorage.getItem('cloudAudio_loop') || 'none';
            updateShuffleButton();
            updateLoopButton();

            if (isOffline) {
                offlineIndicator.classList.remove('hidden');
            }

            // Check for saved token in sessionStorage
            const savedToken = localStorage.getItem('google_access_token');
            if (savedToken) {
                accessToken = savedToken;
                // Send token to Service Worker on initial load
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({ type: 'SET_TOKEN', token: accessToken });
                } else {
                    // If SW is not active yet, wait for it.
                    navigator.serviceWorker.ready.then(registration => {
                        registration.active.postMessage({ type: 'SET_TOKEN', token: accessToken });
                    });
                }
                handleLoginSuccess();
            }

            // Initialize GSI Token Client (OAuth 2.0 Implicit Flow)
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        localStorage.setItem('google_access_token', accessToken);
                        // Send token to SW on new login
                        navigator.serviceWorker.controller.postMessage({ type: 'SET_TOKEN', token: accessToken });
                        handleLoginSuccess();
                    }
                },
            });
        };

        /* --- Event Listeners --- */
        loginBtn.addEventListener('click', () => {
            tokenClient.requestAccessToken();
        });

        signoutBtn.addEventListener('click', () => {
            const token = accessToken;
            // 1. Revoke the token on Google's side to invalidate the session.
            if (token) {
                google.accounts.oauth2.revoke(token, () => { console.log('Access token revoked'); });
            }
            // 2. Clear all application state from storage. This is crucial.
            accessToken = null;
            localStorage.removeItem('google_access_token');
            localStorage.removeItem('cloudAudio_state');
            localStorage.removeItem('cloudAudio_libraryMap');

            // 3. Reload the page. This forces a complete reset of the Google Sign-In
            // library and ensures the login button will work reliably.
            window.location.reload();
        });

        document.getElementById('load-folder-btn').addEventListener('click', () => {
            const inputId = document.getElementById('folder-id-input').value.trim();
            if (inputId) fetchFolderContent(inputId);
        });

        // Player Controls
        miniPlayBtn.addEventListener('click', togglePlay);
        fullPlayBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrevious);
        nextBtn.addEventListener('click', playNext);
        shuffleBtn.addEventListener('click', toggleShuffle);
        loopBtn.addEventListener('click', cycleLoopMode);
        
        expandBtn.addEventListener('click', () => togglePlayerMode(true));
        collapseBtn.addEventListener('click', () => togglePlayerMode(false));
        miniPlayer.addEventListener('click', (e) => {
            if (e.target !== miniPlayBtn && e.target !== expandBtn) togglePlayerMode(true);
        });

        seekSlider.addEventListener('input', (e) => {
            const time = (audio.duration * e.target.value) / 100;
            audio.currentTime = time;
        });

        // Audio Events
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', playNext);
        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
        });

        // Network Status Listeners
        window.addEventListener('offline', () => {
            isOffline = true;
            offlineIndicator.classList.remove('hidden');
            // Re-render current view to apply offline styles
            if (currentFolderId && libraryMap[currentFolderId]) {
                renderLibrary(libraryMap[currentFolderId]);
            }
            console.log("App is offline.");
        });

        window.addEventListener('online', () => {
            isOffline = false;
            offlineIndicator.classList.add('hidden');
            // Re-fetch current folder to get latest data and remove offline styles
            if (currentFolderId) {
                fetchFolderContent(currentFolderId);
            }
            console.log("App is online.");
        });

        // Listen for messages from the Service Worker
        navigator.serviceWorker.addEventListener('message', event => {
            if (event.data.type === 'DOWNLOAD_COMPLETE') {
                const trackId = event.data.trackId;
                console.log(`App: Received confirmation for downloaded track ${trackId}`);
                cachedFileIds.add(trackId);
                downloadingFileIds.delete(trackId); // Remove from in-progress set

                localStorage.setItem('cloudAudio_cachedIds', JSON.stringify(Array.from(cachedFileIds)));
                
                // Re-render the library to update the UI for the downloaded track
                if (currentFolderId && libraryMap[currentFolderId]) {
                    renderLibrary(libraryMap[currentFolderId]);
                }
            } else if (event.data.type === 'DELETE_COMPLETE') {
                const trackId = event.data.trackId;
                console.log(`App: Received confirmation for deleted track ${trackId}`);
                cachedFileIds.delete(trackId);
                downloadingFileIds.delete(trackId); // Also clear from downloading just in case

                localStorage.setItem('cloudAudio_cachedIds', JSON.stringify(Array.from(cachedFileIds)));

                // Re-render to update UI
                if (currentFolderId && libraryMap[currentFolderId]) {
                    renderLibrary(libraryMap[currentFolderId]);
                }
            }
        });

        function handleAuthError() {
            console.error("Authentication error. Token is likely invalid. Forcing sign-out.");
            accessToken = null;
            localStorage.removeItem('google_access_token');
            updateUI(false);
        }

        /* --- Logic --- */
        function handleLoginSuccess() {
            updateUI(true);
            fetchUserProfile();
            
            // Check for folderId in URL
            const urlParams = new URLSearchParams(window.location.search);
            const paramFolderId = urlParams.get('folderId');
            
            if (paramFolderId) {
                fetchFolderContent(paramFolderId).then(restoreState);
            } else {
                // Check localStorage for resume
                if (!restoreState()) {
                    welcomeMessage.classList.add('hidden');
                    folderInputContainer.classList.remove('hidden');
                }
            }
        }

        function updateUI(isAuthenticated) {
            if (isAuthenticated) {
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hidden');
            } else {
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hidden');
                userNameSpan.textContent = '';
                welcomeMessage.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Sign in to access your Google Drive audio folders.</p>';
                welcomeMessage.classList.remove('hidden');
                folderInputContainer.classList.add('hidden');
                libraryContainer.classList.add('hidden');
                libraryContainer.innerHTML = '';
                folderStack = [];
                playerUi.classList.add('hidden');
                audio.pause();
            }
        }

        async function fetchUserProfile() {
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                if (response.status === 401) {
                    handleAuthError();
                    return;
                }
                if (!response.ok) throw new Error(`Failed to fetch profile: ${response.statusText}`);
                
                const data = await response.json();
                if (data.name) {
                    userNameSpan.textContent = data.name;
                }
            } catch (error) {
                console.error('Profile fetch error:', error);
                userNameSpan.textContent = 'User';
            }
        }

        /* --- Folder Crawler --- */
        async function fetchFolderContent(folderId, isBack = false) {            
            welcomeMessage.classList.add('hidden');
            folderInputContainer.classList.add('hidden');
            libraryContainer.classList.remove('hidden');

            // Update navigation stack state
            if (currentFolderId && !isBack && currentFolderId !== folderId) {
                folderStack.push(currentFolderId);
            }
            currentFolderId = folderId;

            // 1. Render from cache (libraryMap) if available
            if (libraryMap[folderId]) {
                renderLibrary(libraryMap[folderId]);
            } else {
                // Show loading state only if nothing is in cache
                libraryContainer.innerHTML = '<div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand"></div></div>';
            }

            // 2. If online, fetch to update cache and UI.
            if (!isOffline) {
                try {
                    const query = `'${folderId}' in parents and trashed = false and (mimeType = 'application/vnd.google-apps.folder' or mimeType contains 'audio/')`;
                    const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name,mimeType,iconLink)&orderBy=folder,name&pageSize=1000`;

                    const response = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });

                    if (response.status === 401) {
                        handleAuthError();
                        return [];
                    }
                    if (!response.ok) throw new Error(`Drive API Error: ${response.statusText}`);

                    const data = await response.json();
                    const items = data.files || [];

                    // Update master map and save to localStorage
                    libraryMap[folderId] = items;
                    localStorage.setItem('cloudAudio_libraryMap', JSON.stringify(libraryMap));

                    // Re-render only if we are still viewing the same folder
                    if (currentFolderId === folderId) {
                        renderLibrary(items);
                    }
                    return items;
                } catch (error) {
                    console.error('Fetch error:', error);
                    if (!libraryMap[folderId]) { // Only show error if we had nothing to display
                        libraryContainer.innerHTML = `<p class="text-red-500 text-center p-4">Error loading folder. Check ID and permissions.</p>`;
                    }
                    return [];
                }
            } else if (!libraryMap[folderId]) {
                // If offline and folder is not in our map, show a message.
                libraryContainer.innerHTML = `<p class="text-gray-500 text-center p-4">Folder not cached. Go online to sync.</p>`;
            }
        }

        function renderLibrary(items) {
            const folderIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" /></svg>`;
            const musicIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-brand"><path d="M3 18h18v2H3zm1.5-2l-2-9 5 3 4.5-7.5L16.5 10l5-3-2 9h-15z"/></svg>`;
            const chevronRightSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>`;

            libraryContainer.innerHTML = '';
            
            // Update Playlist (Filter only audio)
            playlist = items.filter(item => item.mimeType.startsWith('audio/'));
            generateActivePlaylist();

            const headerDiv = document.createElement('div');
            headerDiv.className = 'mb-4 space-y-2';

            // Back Button (if stack has history)
            if (folderStack.length > 0) {
                const backBtn = document.createElement('button');
                backBtn.className = 'flex items-center text-brand font-medium px-2 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded w-full text-left';
                backBtn.innerHTML = '<span class="mr-2">←</span> Back';
                backBtn.onclick = () => {
                    fetchFolderContent(folderStack.pop(), true);
                };
                headerDiv.appendChild(backBtn);
            }

            // Download All Button
            if (playlist.length > 0) {
                const downloadAllBtn = document.createElement('button');
                downloadAllBtn.className = 'flex items-center text-brand font-medium px-2 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded w-full text-left';
                downloadAllBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg> Download All (${playlist.length} tracks)`;
                downloadAllBtn.onclick = () => {
                    if (confirm(`This will download all ${playlist.length} audio files in the current folder. Continue?`)) {
                        downloadFolder(playlist);
                    }
                };
                headerDiv.appendChild(downloadAllBtn);
            }

            // Delete All Cached Button
            const cachedTracksInFolder = playlist.filter(track => cachedFileIds.has(track.id));
            if (cachedTracksInFolder.length > 0) {
                const deleteAllBtn = document.createElement('button');
                deleteAllBtn.className = 'flex items-center text-red-500 font-medium px-2 py-2 hover:bg-red-50 dark:hover:bg-red-900/50 rounded w-full text-left';
                deleteAllBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg> Delete All Cached (${cachedTracksInFolder.length} tracks)`;
                deleteAllBtn.onclick = () => {
                    if (confirm(`This will delete ${cachedTracksInFolder.length} downloaded audio files from this device. The files will remain in your Google Drive. Continue?`)) {
                        deleteFolder(cachedTracksInFolder);
                    }
                };
                headerDiv.appendChild(deleteAllBtn);
            }


            libraryContainer.appendChild(headerDiv);

            // Empty State
            if (items.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = 'text-gray-500 text-center mt-8 pb-4';
                emptyMsg.textContent = 'This folder is empty.';
                libraryContainer.appendChild(emptyMsg);
                return;
            }

            // List Items
            const list = document.createElement('ul');
            list.className = 'space-y-2';

            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'flex items-center p-3 bg-white dark:bg-gray-800 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer';
                
                const isFolder = item.mimeType === 'application/vnd.google-apps.folder';

                // If offline, disable audio files that are NOT cached
                if (isOffline && !isFolder && !cachedFileIds.has(item.id)) {
                    li.classList.add('opacity-50', 'grayscale', 'pointer-events-none');
                }
                
                // Icon
                const iconDiv = document.createElement('div');
                iconDiv.className = 'flex-shrink-0 mr-3 text-xl';
                iconDiv.innerHTML = isFolder ? folderIconSVG : musicIconSVG;
                
                // Text
                const textDiv = document.createElement('div');
                textDiv.className = 'flex-grow min-w-0';
                textDiv.innerHTML = `<p class="text-sm font-medium truncate text-gray-900 dark:text-gray-100">${item.name}</p>`;

                // Action Icon (Play or Chevron)
                const actionDiv = document.createElement('div');
                actionDiv.className = 'flex-shrink-0 ml-2 text-gray-400';
                if (isFolder) {
                    actionDiv.innerHTML = chevronRightSVG;
                } else if (downloadingFileIds.has(item.id)) {
                    // Show a spinning loader if the track is currently being downloaded
                    const loadingSpinner = `<div class="p-2"><svg class="animate-spin h-5 w-5 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></div>`;
                    actionDiv.innerHTML = loadingSpinner;
                } else {
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 transition-opacity';
                    if (cachedFileIds.has(item.id)) {
                        // Show a checkmark if the track is already cached
                        downloadBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-green-500"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" /></svg>`;
                        downloadBtn.title = "Delete from device";
                        downloadBtn.onclick = (e) => {
                            e.stopPropagation();
                            if (confirm(`Delete "${item.name}" from this device?`)) deleteTrack(item);
                        };
                    } else {
                        downloadBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>`;
                        downloadBtn.onclick = (e) => {
                            e.stopPropagation(); // Prevent the li's click handler from firing
                            downloadTrack(item);
                        };
                    }
                    actionDiv.appendChild(downloadBtn);
                }

                li.appendChild(iconDiv);
                li.appendChild(textDiv);
                li.appendChild(actionDiv);

                // Click Handler
                li.onclick = (e) => {
                    e.stopPropagation();
                    if (isFolder) {
                        fetchFolderContent(item.id);
                    } else {
                        // Find index in the currently active (potentially shuffled) playlist
                        const index = activePlaylist.findIndex(t => t.id === item.id);
                        if (index !== -1) {
                            playTrack(index);
                        }
                    }
                };

                list.appendChild(li);
            });

            libraryContainer.appendChild(list);
        }

        function downloadFolder(tracks) {
            if (!navigator.serviceWorker.controller) {
                alert('Service worker is not active. Cannot download.');
                return;
            }
            console.log(`Requesting download for ${tracks.length} tracks.`);

            tracks.forEach(track => downloadingFileIds.add(track.id));
            if (currentFolderId && libraryMap[currentFolderId]) {
                renderLibrary(libraryMap[currentFolderId]);
            }

            navigator.serviceWorker.controller.postMessage({
                type: 'DOWNLOAD_FOLDER',
                tracks: tracks,
                token: accessToken
            });
        }

        function deleteFolder(tracks) {
            if (!navigator.serviceWorker.controller) {
                alert('Service worker is not active. Cannot delete.');
                return;
            }
            console.log(`Requesting deletion for ${tracks.length} tracks.`);
            navigator.serviceWorker.controller.postMessage({
                type: 'DELETE_FOLDER',
                tracks: tracks
            });
        }

        function deleteTrack(track) {
            if (!navigator.serviceWorker.controller) {
                alert('Service worker is not active. Cannot delete.');
                return;
            }
            navigator.serviceWorker.controller.postMessage({ type: 'DELETE_TRACK', track: track });
        }

        function downloadTrack(track) {
            if (!navigator.serviceWorker.controller) {
                alert('Service worker is not active. Cannot download.');
                return;
            }
            // Add to in-progress set and re-render to show spinner
            downloadingFileIds.add(track.id);
            if (currentFolderId && libraryMap[currentFolderId]) {
                renderLibrary(libraryMap[currentFolderId]);
            }

            // Send command to the service worker
            navigator.serviceWorker.controller.postMessage({
                type: 'DOWNLOAD_TRACK',
                track: track,
                token: accessToken // Pass the token for the SW to use
            });
        }

        function generateActivePlaylist() {
            if (shuffleMode) {
                // Fisher-Yates shuffle
                let shuffled = [...playlist];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                activePlaylist = shuffled;
            } else {
                activePlaylist = playlist;
            }
        }

        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            localStorage.setItem('cloudAudio_shuffle', shuffleMode);
            updateShuffleButton();
            
            const currentTrack = currentTrackIndex !== -1 ? activePlaylist[currentTrackIndex] : null;
            generateActivePlaylist();

            if (currentTrack) {
                currentTrackIndex = activePlaylist.findIndex(t => t.id === currentTrack.id);
            }
        }

        function cycleLoopMode() {
            if (loopMode === 'none') loopMode = 'folder';
            else if (loopMode === 'folder') loopMode = 'single';
            else loopMode = 'none';
            localStorage.setItem('cloudAudio_loop', loopMode);
            updateLoopButton();
        }

        function updateShuffleButton() {
            shuffleBtn.classList.toggle('text-brand', shuffleMode);
            shuffleBtn.classList.toggle('bg-emerald-100', shuffleMode);
            shuffleBtn.classList.toggle('dark:bg-emerald-900', shuffleMode);
        }

        function updateLoopButton() {
            loopBtn.classList.remove('text-brand', 'bg-emerald-100', 'dark:bg-emerald-900');
            if (loopMode === 'folder') {
                loopBtn.classList.add('text-brand', 'bg-emerald-100', 'dark:bg-emerald-900');
                loopBtn.textContent = 'Loop: All';
            } else if (loopMode === 'single') {
                loopBtn.classList.add('text-brand', 'bg-emerald-100', 'dark:bg-emerald-900');
                loopBtn.textContent = 'Loop: One';
            } else {
                loopBtn.textContent = 'Loop: Off';
            }
        }

        /* --- Audio Engine --- */
        async function playTrack(index, autoPlay = true, startAt = 0) {
            try {
                if (index < 0 || index >= activePlaylist.length) return;

                currentTrackIndex = index;
                const track = activePlaylist[index];
                
                // Reset Audio State immediately to stop previous track
                audio.pause();
                audio.src = '';
                const loadingIcon = '<span class="animate-spin inline-block">↻</span>';
                miniPlayBtn.innerHTML = loadingIcon;
                fullPlayBtn.innerHTML = loadingIcon;

                // Cleanup previous object URL
                if (currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                    currentObjectUrl = null;
                }

                const mediaUrl = `https://www.googleapis.com/drive/v3/files/${track.id}?alt=media`;
                const audioCache = await caches.open(AUDIO_CACHE_NAME);
                const cachedResponse = await audioCache.match(mediaUrl);

                if (cachedResponse) {
                    // --- PATH 1: PLAY FROM CACHE ---
                    console.log(`Playing ${track.name} from CACHE`);
                    const blob = await cachedResponse.blob();
                    currentObjectUrl = URL.createObjectURL(blob);
                    audio.src = currentObjectUrl;
                } else {
                    // --- PATH 2: STREAM FROM NETWORK ---
                    if (isOffline) {
                        console.error("Cannot play track: Offline and not in cache.");
                        miniPlayBtn.innerHTML = '⚠️';
                        fullPlayBtn.innerHTML = '⚠️';
                        return;
                    }
                    console.log(`Playing ${track.name} from NETWORK (streaming)`);
                    // **Crucial Fix**: Ensure the SW has the token right before we ask it to stream.
                    if (navigator.serviceWorker.controller) {
                        navigator.serviceWorker.controller.postMessage({ type: 'SET_TOKEN', token: accessToken });
                    }
                    // Let the service worker handle the authenticated fetch for streaming
                    audio.src = mediaUrl;
                }

                // Resume Logic: Attach listener before setting src
                if (startAt > 0) {
                    audio.addEventListener('loadedmetadata', () => {
                        if (isFinite(startAt)) {
                            audio.currentTime = startAt;
                        }
                    }, { once: true });
                }

                audio.title = track.name; // Store title on audio object for reference
                
                if (autoPlay) {
                    const playPromise = audio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => updatePlayBtn(true))
                                 .catch(error => {
                                     console.error("Auto-play was prevented:", error);
                                     updatePlayBtn(false); // Show play button if autoplay is blocked
                                 });
                    }
                } else {
                    updatePlayBtn(false);
                }

                // Update UI Text and Media Session
                miniTitle.textContent = track.name;
                fullTitle.textContent = track.name;
                playerUi.classList.remove('hidden');
                // Setup Media Session
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: track.name,
                        artist: 'CloudAudio',
                        album: 'Google Drive'
                    });
                    
                    navigator.mediaSession.setActionHandler('play', () => { audio.play(); updatePlayBtn(true); });
                    navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); updatePlayBtn(false); });
                    navigator.mediaSession.setActionHandler('previoustrack', playPrevious);
                    navigator.mediaSession.setActionHandler('nexttrack', playNext);
                }
            } catch (error) {
                console.error('Error playing track:', error);
                miniPlayBtn.innerHTML = '⚠️';
                fullPlayBtn.innerHTML = '⚠️';
            }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                updatePlayBtn(true);
            } else {
                audio.pause();
                updatePlayBtn(false);
            }
        }

        function updatePlayBtn(isPlaying) {
            const playIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-12 h-12"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.647c1.295.742 1.295 2.545 0 3.286L7.279 20.99c-1.25.717-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" /></svg>`;
            const pauseIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-12 h-12"><path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 01.75-.75H9a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75H7.5a.75.75 0 01-.75-.75V5.25zm7.5 0a.75.75 0 01.75-.75h1.5a.75.75 0 01.75.75v13.5a.75.75 0 01-.75.75h-1.5a.75.75 0 01-.75-.75V5.25z" clip-rule="evenodd" /></svg>`;
            const miniPlayIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z" /></svg>`;
            const miniPauseIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6"><path d="M5.75 4.5a.75.75 0 00-.75.75v10.5a.75.75 0 001.5 0V5.25A.75.75 0 005.75 4.5zm7.5 0a.75.75 0 00-.75.75v10.5a.75.75 0 001.5 0V5.25a.75.75 0 00-.75-.75z" /></svg>`;

            if (isPlaying) {
                miniPlayBtn.innerHTML = miniPauseIconSVG;
                fullPlayBtn.innerHTML = pauseIconSVG;
            } else {
                miniPlayBtn.innerHTML = miniPlayIconSVG;
                fullPlayBtn.innerHTML = playIconSVG;
            }
        }

        function playNext() {
            if (loopMode === 'single') {
                playTrack(currentTrackIndex);
                return;
            }

            const nextIndex = currentTrackIndex + 1;

            if (nextIndex >= activePlaylist.length) {
                // Reached end of playlist
                if (loopMode === 'folder') {
                    playTrack(0); // Loop to start
                } else {
                    // loopMode is 'none', so stop.
                    audio.pause();
                    updatePlayBtn(false);
                    audio.currentTime = 0;
                    updateProgress();
                }
            } else {
                playTrack(nextIndex);
            }
        }

        function playPrevious() {
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
            } else if (currentTrackIndex > 0) {
                playTrack(currentTrackIndex - 1);
            }
        }

        function updateProgress() {
            const { currentTime, duration } = audio;
            if (!isFinite(duration) || !isFinite(currentTime)) return;

            const percent = (currentTime / duration) * 100;
            seekSlider.value = percent;
            miniProgressBar.style.width = `${percent}%`;
            currentTimeSpan.textContent = formatTime(currentTime);
            
            // Save state every ~5 seconds (throttled by check)
            if (Math.floor(currentTime) % 5 === 0) {
                saveState();
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function togglePlayerMode(expand) {
            isPlayerExpanded = expand;
            if (expand) {
                // When expand is true: Go to fullscreen
                playerUi.classList.add('h-screen', 'top-0');
                playerUi.classList.remove('h-16', 'bottom-0');
                miniPlayer.classList.add('hidden');
                fullPlayer.classList.remove('hidden');
            } else {
                // When expand is false: Collapse to mini-player
                playerUi.classList.add('h-16', 'bottom-0');
                playerUi.classList.remove('h-screen', 'top-0');
                miniPlayer.classList.remove('hidden');
                fullPlayer.classList.add('hidden');
            }
        }

        /* --- Persistence --- */
        function saveState() {
            if (!currentFolderId || currentTrackIndex === -1 || !activePlaylist[currentTrackIndex]) return;
            const state = {
                folderId: currentFolderId,
                fileId: activePlaylist[currentTrackIndex].id,
                currentTime: audio.currentTime,
                timestamp: Date.now(),
                folderStack: folderStack
            };
            localStorage.setItem('cloudAudio_state', JSON.stringify(state));
        }

        function restoreState() {
            const saved = localStorage.getItem('cloudAudio_state');
            if (!saved) return false;

            const state = JSON.parse(saved);
            
            if (state.folderStack && Array.isArray(state.folderStack)) {
                folderStack = state.folderStack;
            }


            // If we are not already in the folder, load it
            if (state.folderId && state.folderId !== currentFolderId) {
                fetchFolderContent(state.folderId).then(() => {
                    // After folder loads, find file in the active playlist
                    const index = activePlaylist.findIndex(item => item.id === state.fileId);
                    if (index !== -1) {
                        const resumeTime = state.currentTime || 0;
                        playTrack(index, false, resumeTime); // Load but don't auto-play
                    }
                });
                return true;
            }
            return false;
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
